<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonauAI - Profile Settings</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-50 text-slate-800 antialiased font-sans">
  <div id="app" class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Left Side: Logo & Nav -->
          <div class="flex items-center">
            <!-- Logo -->
            <a href="/" class="flex-shrink-0 flex items-center pr-6 border-r border-gray-100">
              <span class="text-2xl font-bold tracking-tighter text-[#0f172a]">donau</span><span
                class="text-2xl font-normal tracking-tighter text-[#0f172a]">.ai</span>
            </a>

            <!-- Nav Links -->
            <nav class="hidden md:flex items-center gap-8 pl-6">
              <a href="#"
                class="text-blue-500 font-medium text-xs flex items-center gap-2 border-b-2 border-blue-500 pb-[21px] mt-[21px]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                  </path>
                </svg>
                Dashboard
              </a>
              <a href="briefs.html"
                class="text-slate-500 hover:text-slate-900 font-medium text-xs flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                  </path>
                </svg>
                My Briefs
              </a>
              <a href="messages.html"
                class="text-slate-500 hover:text-slate-900 font-medium text-xs flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                  </path>
                </svg>
                Messages
              </a>
            </nav>
          </div>

          <!-- Right Actions -->
          <div class="flex items-center gap-3">
            <button
              class="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-50 transition-colors relative">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                </path>
              </svg>
            </button>

            <div class="w-px h-5 bg-gray-200 mx-1"></div>

            <div class="h-8 w-8 rounded-full flex items-center justify-center text-white text-xs font-medium"
              style="background-color: #3B82F6;">E</div>

            <button
              class="h-8 w-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-500 hover:bg-slate-100 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
      <h1 class="text-2xl font-bold text-slate-900 mb-8">Profile Settings</h1>

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- Tabs (Not functional in static HTML but visual) -->
        <div class="flex border-b border-gray-100">
          <a href="#" class="px-6 py-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600">General</a>
          <a href="settings-billing.html"
            class="px-6 py-3 text-sm font-medium text-slate-500 hover:text-slate-800">Billing</a>
        </div>

        <div class="p-8">
          <!-- Profile Picture -->
          <div class="flex items-center gap-6 mb-8">
            <div
              class="h-20 w-20 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-2xl">
              JD
            </div>
            <div>
              <button
                class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 transition-colors">Change
                Photo</button>
              <p class="text-xs text-slate-400 mt-2">JPG, GIF or PNG. Max size of 800K</p>
            </div>
          </div>

          <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">First Name</label>
                <input type="text" value="John"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm text-slate-900">
              </div>
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Last Name</label>
                <input type="text" value="Doe"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm text-slate-900">
              </div>
              <div class="col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Email Address</label>
                <input type="email" value="john@brand.com"
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm text-slate-900">
              </div>
              <div class="col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Company Name</label>
                <input type="text" value="Brand Inc."
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm text-slate-900">
              </div>
            </div>

            <div class="pt-6 border-t border-gray-50">
              <h3 class="text-base font-bold text-slate-900 mb-4">Change Password</h3>
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-bold text-slate-700 mb-1.5">Current Password</label>
                  <input type="password"
                    class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">New Password</label>
                    <input type="password"
                      class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                  </div>
                  <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Confirm Password</label>
                    <input type="password"
                      class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                  </div>
                </div>
              </div>
            </div>

            <div class="flex justify-end pt-6">
              <button type="button"
                class="px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm shadow-blue-200">Save
                Changes</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-8 mt-auto">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-center text-slate-400 text-sm">
          &copy; 2026 DonauApp
        </div>
      </div>
    </footer>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
