<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DonauAI - Create Brief Manually</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="bg-gray-50 text-slate-800 antialiased font-sans">
    <div id="app" class="flex flex-col min-h-screen">
        <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Left Side: Logo & Nav -->
          <div class="flex items-center">
            <!-- Logo -->
            <a href="/" class="flex-shrink-0 flex items-center pr-6 border-r border-gray-100">
              <span class="text-2xl font-bold tracking-tighter text-[#0f172a]">donau</span><span
                class="text-2xl font-normal tracking-tighter text-[#0f172a]">.ai</span>
            </a>

            <!-- Nav Links -->
            <nav class="hidden md:flex items-center gap-8 pl-6">
              <a href="#"
                class="text-blue-500 font-medium text-xs flex items-center gap-2 border-b-2 border-blue-500 pb-[21px] mt-[21px]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                  </path>
                </svg>
                Dashboard
              </a>
              <a href="briefs.html"
                class="text-slate-500 hover:text-slate-900 font-medium text-xs flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                  </path>
                </svg>
                My Briefs
              </a>
              <a href="messages.html"
                class="text-slate-500 hover:text-slate-900 font-medium text-xs flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                  </path>
                </svg>
                Messages
              </a>
            </nav>
          </div>

          <!-- Right Actions -->
          <div class="flex items-center gap-3">
            <button
              class="text-slate-400 hover:text-slate-600 p-2 rounded-full hover:bg-slate-50 transition-colors relative">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                </path>
              </svg>
            </button>

            <div class="w-px h-5 bg-gray-200 mx-1"></div>

            <div class="h-8 w-8 rounded-full flex items-center justify-center text-white text-xs font-medium"
              style="background-color: #3B82F6;">E</div>

            <button
              class="h-8 w-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-500 hover:bg-slate-100 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

      <!-- Main Content -->
        <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">Create New Brief</h1>
                    <p class="text-slate-500 mt-1">Fill in the details below to create your product brief.</p>
                </div>
                <div class="flex gap-3">
                    <a href="briefs.html" class="whitespace-nowrap px-4 py-2 bg-white border border-gray-200 text-slate-600 rounded-lg hover:bg-gray-50 font-medium text-sm transition-colors">Cancel</a>
                    <button class="whitespace-nowrap px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm shadow-sm shadow-blue-200 transition-colors">Publish Brief</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:p-8">
                <form class="space-y-8">
                    <!-- Section 1: Basic Info -->
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-4 pb-2 border-b border-gray-50">Basic Information</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="col-span-2">
                                <label class="block text-sm font-bold text-slate-900 mb-1.5">Project Title</label>
                                <input type="text" placeholder="e.g. Summer 2026 T-Shirt Collection" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-900 mb-1.5">Product Category</label>
                                <select class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm bg-white">
                                    <option>Select Category</option>
                                    <option>Apparel</option>
                                    <option>Footwear</option>
                                    <option>Accessories</option>
                                    <option>Home Textiles</option>
                                </select>
                            </div>
                             <div>
                                <label class="block text-sm font-bold text-slate-900 mb-1.5">Target Quantity</label>
                                <input type="number" placeholder="e.g. 500" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Details -->
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-4 pb-2 border-b border-gray-50">Product Details</h2>
                         <div class="space-y-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-900 mb-1.5">Description</label>
                                <textarea rows="6" placeholder="Describe your product requirements in detail..." class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm resize-none"></textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-bold text-slate-900 mb-1.5">Materials</label>
                                    <input type="text" placeholder="e.g. 100% Organic Cotton" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-900 mb-1.5">Desired Delivery Date</label>
                                    <input type="date" class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm text-slate-500">
                                </div>
                            </div>
                         </div>
                    </div>

                    <!-- Section 3: Uploads -->
                    <div>
                        <h2 class="text-lg font-bold text-slate-900 mb-4 pb-2 border-b border-gray-50">Attachments</h2>
                        <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors cursor-pointer">
                            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 mx-auto mb-4">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            </div>
                            <p class="text-sm font-medium text-slate-900">Click to upload or drag and drop</p>
                            <p class="text-xs text-slate-500 mt-1">Tech packs, sketches, mood boards (PDF, PNG, JPG)</p>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
