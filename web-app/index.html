<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonauAI - Sign In</title>
  <meta name="robots" content="noindex, nofollow">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-white text-slate-800 antialiased font-sans flex flex-col min-h-screen">
  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Left Side: Logo only for Auth pages -->
        <div class="flex items-center">
          <!-- Logo -->
          <a href="/" class="flex-shrink-0 flex items-center pr-6">
            <img src="/logo.svg" alt="Donau AI Logo" class="h-8 w-auto">
          </a>
        </div>

        <!-- Right Side: Language Selector -->
        <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="22" height="15" class="rounded-sm shadow-[0_0_1px_rgba(0,0,0,0.2)]">
            <clipPath id="s">
              <path d="M0,0 v30 h60 v-30 z"/>
            </clipPath>
            <clipPath id="t">
              <path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z"/>
            </clipPath>
            <g clip-path="url(#s)">
              <path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
              <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
              <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4"/>
              <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
              <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/>
            </g>
          </svg>
          <span class="text-[13px] text-slate-700 font-medium">English</span>
          <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 w-full h-full relative" style="min-height: calc(100vh - 160px);">
    <div class="w-full max-w-[400px] mx-auto mt-16">
      <h1 class="text-[32px] font-bold text-center text-[#0f172a] mb-2 tracking-tight">Welcome Back</h1>
      <p class="text-center text-[#64748b] text-[15px] mb-8">Enter your credentials to access your account</p>

      <form onsubmit="event.preventDefault();" class="space-y-5">
        <div>
          <label for="email" class="block text-[13px] font-medium text-[#0f172a] mb-2">Email</label>
          <input type="email" id="email" value="emilyparker@gmail.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
        </div>
        <div>
          <label for="password" class="block text-[13px] font-medium text-[#0f172a] mb-2">Password</label>
          <div class="relative">
            <input type="text" style="-webkit-text-security: disc;" id="password" value="password123"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm tracking-widest text-slate-800 font-serif">
            <button type="button" class="absolute right-4 top-3.5 text-[#0f172a] hover:text-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                </path>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked
              class="w-[18px] h-[18px] text-[#3b82f6] border-gray-300 rounded focus:ring-[#3b82f6] bg-white accent-[#3b82f6]">
            <span class="text-[15px] text-[#64748b]">Remember Me</span>
          </label>
          <a href="forgot-password.html"
            class="text-[15px] font-medium text-[#3b82f6] hover:text-blue-700 transition-colors">Forgot
            Password</a>
        </div>

        <button type="button" onclick="window.location.href='dashboard.html'"
          class="w-full bg-[#4082ED] hover:bg-blue-600 text-white font-medium py-3 rounded-lg transition-all text-[15px] mt-2 h-[46px]">Sign
          In</button>
      </form>

      <p class="text-center text-[15px] text-[#0f172a] mt-8">
        Don't have an account? <a href="signup.html" class="text-[#3b82f6] hover:text-blue-700 font-medium">Sign
          Up</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full py-8 flex flex-col items-center gap-3 text-sm text-[#475569]">
    <div class="flex gap-1.5">
      <a href="privacy.html" class="hover:text-slate-900 transition-colors">Privacy Policy</a>
      <span>|</span>
      <a href="terms.html" class="hover:text-slate-900 transition-colors">Terms of Service</a>
    </div>
    <span>&copy; 2026 DonauAI</span>
  </footer>

</body>

</html>
