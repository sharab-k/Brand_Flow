<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonauAI - Create New Password</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-white text-slate-800 antialiased font-sans h-full">
  <div id="app" class="flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Left Side: Logo only for Auth pages -->
          <div class="flex items-center">
            <!-- Logo -->
            <a href="/" class="flex-shrink-0 flex items-center pr-6">
              <span class="text-2xl font-bold tracking-tighter text-[#0f172a]">donau</span><span
                class="text-2xl font-normal tracking-tighter text-[#0f172a]">.ai</span>
            </a>
          </div>

          <!-- Right Side: Language Selector -->
          <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="22" height="15"
              class="rounded-sm shadow-[0_0_1px_rgba(0,0,0,0.2)]">
              <clipPath id="s">
                <path d="M0,0 v30 h60 v-30 z" />
              </clipPath>
              <clipPath id="t">
                <path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z" />
              </clipPath>
              <g clip-path="url(#s)">
                <path d="M0,0 v30 h60 v-30 z" fill="#012169" />
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
                <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4" />
                <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10" />
                <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6" />
              </g>
            </svg>
            <span class="text-[13px] text-slate-700 font-medium">English</span>
            <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 pt-20">
      <div class="w-full max-w-[400px]">
        <!-- Heading Sections -->
        <div class="text-center mb-8">
          <h1 class="text-[32px] font-bold text-[#0f172a] mb-2">Create New Password</h1>
          <p class="text-[14px] text-[#64748b]">Enter a strong new password to secure your account.</p>
        </div>

        <form class="space-y-6">
          <!-- New Password Input Group -->
          <div class="flex flex-col gap-2">
            <label class="text-[14px] font-medium text-[#0f172a]">New Password</label>
            <div class="relative w-full">
              <input type="password" value="12345678"
                class="w-full bg-white border border-gray-200 text-slate-800 text-[15px] rounded-md focus:outline-none focus:ring-1 focus:ring-[#3B82F6] block px-4 py-3 pr-12 transition-all">
              <!-- eye-off icon -->
              <div class="absolute inset-y-0 right-0 flex items-center pr-4">
                <svg class="w-5 h-5 text-gray-400 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                  </path>
                </svg>
              </div>
            </div>
          </div>

          <!-- Confirm Password Input Group -->
          <div class="flex flex-col gap-2 mb-6">
            <label class="text-[14px] font-medium text-[#0f172a]">Confirm Password</label>
            <div class="relative w-full">
              <input type="password" value="12345678"
                class="w-full bg-white border border-gray-200 text-slate-800 text-[15px] rounded-md focus:outline-none focus:ring-1 focus:ring-[#3B82F6] block px-4 py-3 pr-12 transition-all">
              <!-- eye-off icon -->
              <div class="absolute inset-y-0 right-0 flex items-center pr-4">
                <svg class="w-5 h-5 text-gray-400 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                  xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                  </path>
                </svg>
              </div>
            </div>
          </div>

          <button type="button" onclick="window.location.href='password-successful.html'"
            class="w-full text-white font-bold py-3 rounded-md transition-colors text-[14px] shadow-sm"
            style="background-color: #3B82F6;">
            Save Password
          </button>
        </form>
      </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-16 flex flex-col items-center justify-center gap-2 text-sm text-[#475569] shrink-0">
      <div class="flex justify-center gap-1.5 opacity-80">
        <a href="privacy.html" class="hover:text-slate-900 transition-colors">Privacy Policy</a>
        <span class="px-1 text-slate-300">|</span>
        <a href="terms.html" class="hover:text-slate-900 transition-colors">Terms of Service</a>
      </div>
      <p class="opacity-60">&copy; 2026 DonauAI</p>
    </footer>
  </div>
</body>

</html>
