<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonauAI - Verify Your Email</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-white text-slate-800 antialiased font-sans flex flex-col min-h-screen">
  <div id="app" class="flex flex-col min-h-screen">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Left Side: Logo only for Auth pages -->
          <div class="flex items-center">
            <!-- Logo -->
            <a href="/" class="flex-shrink-0 flex items-center pr-6">
              <img src="/logo.svg" alt="Donau AI Logo" class="h-8 w-auto">
            </a>
          </div>

          <!-- Right Side: Language Selector -->
          <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="22" height="15"
              class="rounded-sm shadow-[0_0_1px_rgba(0,0,0,0.2)]">
              <clipPath id="s">
                <path d="M0,0 v30 h60 v-30 z" />
              </clipPath>
              <clipPath id="t">
                <path d="M30,15 h30 v15 z v-15 h-30 z h-30 v-15 z v15 h30 z" />
              </clipPath>
              <g clip-path="url(#s)">
                <path d="M0,0 v30 h60 v-30 z" fill="#012169" />
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
                <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#C8102E" stroke-width="4" />
                <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10" />
                <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6" />
              </g>
            </svg>
            <span class="text-[13px] text-slate-700 font-medium">English</span>
            <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full relative flex flex-col items-center justify-center p-4"
      style="min-height: calc(100vh - 160px);">
      <div class="w-full max-w-md mx-auto flex flex-col items-center justify-center">

        <!-- Mail Icon -->
        <div class="w-16 h-16 sm:w-[72px] sm:h-[72px] bg-[#4082ED] rounded-full flex items-center justify-center mb-6">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" />
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>

        <h1 class="text-[26px] sm:text-[28px] font-bold text-center text-[#0f172a] mb-3 tracking-tight">Verify
          Your Email</h1>
        <p class="text-center text-[#64748b] text-[14px] sm:text-[15px] mb-8 leading-relaxed max-w-[400px]">
          We've sent a verification link to your email. Please verify to activate your account.</p>

        <button type="button" onclick="window.location.href='create-new-password.html'"
          class="w-full max-w-[360px] bg-[#4082ED] hover:bg-blue-600 text-white font-medium py-[14px] rounded-lg transition-all text-[15px] shadow-sm">Sign
          In</button>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="w-full py-8 flex flex-col items-center gap-3 text-sm text-[#475569]">
    <div class="flex gap-1.5">
      <a href="privacy.html" class="hover:text-slate-900 transition-colors">Privacy Policy</a>
      <span>|</span>
      <a href="terms.html" class="hover:text-slate-900 transition-colors">Terms of Service</a>
    </div>
    <span>&copy; 2026 DonauAI</span>
  </footer>
</body>

</html>
