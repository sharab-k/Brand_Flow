<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DonauAI - Create your account</title>
  <meta name="robots" content="noindex, nofollow">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./input.css">
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-white text-slate-800 antialiased font-sans flex flex-col min-h-screen" x-data="{ role: 'brand', showPass: false, showConfirmPass: false }">
  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Left Side: Logo only for Auth pages -->
        <div class="flex items-center">
          <!-- Logo -->
          <a href="/" class="flex-shrink-0 flex items-center pr-6">
            <img src="/logo.svg" alt="Donau AI Logo" class="h-8 w-auto">
          </a>
        </div>

        <!-- Right Side: Language Selector -->
        <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
          <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Flag_of_the_United_Kingdom_%281-2%29.svg" alt="UK Flag" class="w-5 h-3.5 rounded-sm object-cover shadow-sm">
          <span class="text-[13px] text-slate-700 font-medium ml-1">English</span>
          <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow flex flex-col items-center justify-start pt-12 pb-16 px-4">
    <div class="w-full max-w-[540px]">
      <h1 class="text-[32px] font-bold text-center text-[#0f172a] mb-2 tracking-tight">Create your account</h1>
      <p class="text-center text-[#64748b] text-[15px] mb-10">Start connecting with trusted partners today</p>

      <!-- Role Selection -->
      <div class="mb-8 items-start">
        <label class="block text-[13px] font-medium text-[#0f172a] mb-3">I am a <span class="text-red-500">*</span></label>
        <div class="grid grid-cols-2 gap-4">
          <div @click="role = 'brand'" :class="role === 'brand' ? 'active' : ''" class="role-option">
            <div class="role-icon">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="10" width="20" height="12" rx="2"/><path d="M6 10V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4"/></svg>
            </div>
            <div>
              <p class="text-[14px] font-bold text-slate-900 leading-tight">Brand</p>
              <p class="text-[11px] text-slate-500 mt-0.5">Looking for manufacturers</p>
            </div>
          </div>
          <div @click="role = 'manufacturer'" :class="role === 'manufacturer' ? 'active' : ''" class="role-option">
            <div class="role-icon">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M3 7v14"/><path d="M10 21V7l3-3 7 7v10"/><path d="M10 11h2"/><path d="M10 15h2"/></svg>
            </div>
            <div>
              <p class="text-[14px] font-bold text-slate-900 leading-tight">Manufacturer</p>
              <p class="text-[11px] text-slate-500 mt-0.5">Looking for clients</p>
            </div>
          </div>
        </div>
      </div>

      <form action="#" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[13px] font-medium text-[#0f172a] mb-2">First Name</label>
            <input type="text" placeholder="Emily"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
          </div>
          <div>
            <label class="block text-[13px] font-medium text-[#0f172a] mb-2">Last Name</label>
            <input type="text" placeholder="Parker"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
          </div>
        </div>

        <div>
          <label class="block text-[13px] font-medium text-[#0f172a] mb-2">Organization Name</label>
          <input type="text" placeholder="Evergreen Apparel Co"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
        </div>

        <div>
          <label class="block text-[13px] font-medium text-[#0f172a] mb-2">Work Email</label>
          <input type="email" placeholder="emilyparker@gmail.com"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
        </div>

        <div>
          <label class="block text-[13px] font-medium text-[#0f172a] mb-2">Password</label>
          <div class="relative">
            <input :type="showPass ? 'text' : 'password'" placeholder="12345678"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
            <button type="button" @click="showPass = !showPass" class="absolute right-4 top-3 text-slate-400 hover:text-slate-600">
              <svg x-show="!showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.51-4.51A9.959 9.959 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-2.101-2.101L12 12m0 0L3 3m3.303 3.303L12 12"/></svg>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-[13px] font-medium text-[#0f172a] mb-2">Confirm Password</label>
          <div class="relative">
            <input :type="showConfirmPass ? 'text' : 'password'" placeholder="12345678"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-800">
            <button type="button" @click="showConfirmPass = !showConfirmPass" class="absolute right-4 top-3 text-slate-400 hover:text-slate-600">
              <svg x-show="!showConfirmPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showConfirmPass" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.51-4.51A9.959 9.959 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-2.101-2.101L12 12m0 0L3 3m3.303 3.303L12 12"/></svg>
            </button>
          </div>
        </div>

        <div class="flex items-start gap-3 pt-1">
          <input type="checkbox" id="terms" class="mt-1 w-4 h-4 text-blue-500 border-gray-300 rounded focus:ring-blue-500 bg-white shadow-sm cursor-pointer accent-blue-500">
          <label for="terms" class="text-[14px] text-slate-500 leading-tight cursor-pointer">
            By creating an account, you agree to our <a href="#" class="text-slate-600 hover:text-slate-900 font-medium">Terms of Service</a> and <a href="#" class="text-slate-600 hover:text-slate-900 font-medium">Privacy Policy</a>
          </label>
        </div>

        <button type="button" @click="window.location.href='otp-verification.html'"
          class="w-full bg-[#E5E7EB] hover:bg-gray-300 text-slate-600 font-medium py-3 rounded-lg transition-all text-[15px] mt-4 h-[48px]">Create Account</button>
      </form>

      <p class="text-center text-[15px] text-slate-900 mt-8">
        Already have an account? <a href="index.html" class="text-blue-600 hover:text-blue-700 font-medium">Sign In</a>
      </p>

      <!-- Bottom Links -->
      <div class="mt-12 text-center">
        <div class="flex justify-center gap-2 text-[13px] text-slate-500 font-medium mb-3">
          <a href="#" class="hover:text-slate-900 transition-colors">Privacy Policy</a>
          <span>|</span>
          <a href="#" class="hover:text-slate-900 transition-colors">Terms of Service</a>
        </div>
        <p class="text-[13px] text-slate-400">&copy; 2026 DonauAI</p>
      </div>
    </div>
  </main>
</body>

</html>
